name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install lint tools
        run: |
          pip install ruff black
          
      - name: Run Ruff
        run: |
          ruff check src/
          
      - name: Check formatting
        run: |
          black --check src/
          
      - name: Type check (optional)
        run: |
          pip install mypy
          mypy src/ || true
